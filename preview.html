<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>点单小程序</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            color: #333;
            max-width: 450px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        .price {
            color: #ff6b35;
            font-weight: bold;
        }
        
        .price::before {
            content: '¥';
            font-size: 0.7em;
        }
        
        .text-ellipsis {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* 顶部导航栏 */
        
        .nav-bar {
            background: #ff6b35;
            color: #fff;
            padding: 12px 16px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        /* 页面容器 */
        
        .page {
            display: none;
            padding-bottom: 70px;
            min-height: 100vh;
        }
        
        .page.active {
            display: block;
        }
        /* 底部 TabBar */
        
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            display: flex;
            background: #fff;
            border-top: 1px solid #eee;
            z-index: 300;
        }
        
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 8px 0 4px;
            font-size: 11px;
            color: #999;
            cursor: pointer;
        }
        
        .tab-item.active {
            color: #ff6b35;
        }
        
        .tab-icon {
            font-size: 22px;
            display: block;
            margin-bottom: 2px;
        }
        /* 首页 */
        
        .search-bar {
            padding: 12px 16px;
            background: #fff;
        }
        
        .search-input {
            display: flex;
            align-items: center;
            height: 40px;
            background: #f5f5f5;
            border-radius: 20px;
            padding: 0 14px;
            cursor: pointer;
        }
        
        .search-input span {
            font-size: 14px;
            color: #999;
            margin-left: 8px;
        }
        
        .banner {
            margin: 10px 16px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }
        
        .banner-inner {
            display: flex;
            transition: transform 0.5s;
        }
        
        .banner-item {
            min-width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
        }
        
        .banner-item:nth-child(1) {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
        }
        
        .banner-item:nth-child(2) {
            background: linear-gradient(135deg, #e74c3c, #f39c12);
        }
        
        .banner-item:nth-child(3) {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        
        .banner-dots {
            text-align: center;
            padding: 8px;
        }
        
        .banner-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ccc;
            margin: 0 3px;
        }
        
        .banner-dot.active {
            background: #ff6b35;
            width: 18px;
            border-radius: 3px;
        }
        
        .section {
            background: #fff;
            margin: 10px 16px;
            border-radius: 12px;
            padding: 16px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 14px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-more {
            font-size: 13px;
            color: #999;
            cursor: pointer;
        }
        
        .cat-grid {
            display: flex;
            flex-wrap: wrap;
        }
        
        .cat-item {
            width: 25%;
            text-align: center;
            margin-bottom: 14px;
            cursor: pointer;
        }
        
        .cat-icon {
            font-size: 32px;
            display: block;
            margin-bottom: 6px;
        }
        
        .cat-name {
            font-size: 12px;
            color: #666;
        }
        
        .hot-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 4px;
        }
        
        .hot-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .hot-item {
            min-width: 130px;
            cursor: pointer;
        }
        
        .hot-img {
            width: 130px;
            height: 100px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            position: relative;
            overflow: hidden;
        }
        
        .hot-item:nth-child(1) .hot-img {
            background: linear-gradient(135deg, #ffe0d3, #ffccbc);
        }
        
        .hot-item:nth-child(2) .hot-img {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
        }
        
        .hot-item:nth-child(3) .hot-img {
            background: linear-gradient(135deg, #fff3e0, #ffe0b2);
        }
        
        .hot-item:nth-child(4) .hot-img {
            background: linear-gradient(135deg, #f3e5f5, #e1bee7);
        }
        
        .hot-item:nth-child(5) .hot-img {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        }
        
        .hot-item:nth-child(6) .hot-img {
            background: linear-gradient(135deg, #e0f7fa, #b2ebf2);
        }
        
        .hot-tag {
            position: absolute;
            top: 6px;
            left: 6px;
            background: #ff6b35;
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .hot-name {
            font-size: 13px;
            margin: 6px 0;
        }
        
        .hot-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .hot-sales {
            font-size: 11px;
            color: #bbb;
        }
        
        .cart-entry {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 418px;
            background: #ff6b35;
            color: #fff;
            border-radius: 24px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            z-index: 250;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255, 107, 53, 0.4);
            display: none;
        }
        
        .cart-entry .badge {
            background: #fff;
            color: #ff6b35;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            text-align: center;
            line-height: 22px;
            font-weight: bold;
        }
        /* 点餐页 */
        
        .menu-layout {
            display: flex;
            height: calc(100vh - 70px);
        }
        
        .cat-sidebar {
            width: 90px;
            background: #fafafa;
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .cat-sidebar-item {
            padding: 16px 8px;
            text-align: center;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            position: relative;
            border-left: 3px solid transparent;
        }
        
        .cat-sidebar-item.active {
            color: #ff6b35;
            background: #fff;
            border-left-color: #ff6b35;
            font-weight: bold;
        }
        
        .cat-sidebar-emoji {
            display: block;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            margin: 0 auto 4px;
            object-fit: cover;
        }
        
        .food-panel {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .food-card {
            display: flex;
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .food-card-img {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
        }
        
        .food-card-info {
            flex: 1;
            margin-left: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .food-card-name {
            font-size: 15px;
            font-weight: bold;
        }
        
        .food-card-desc {
            font-size: 12px;
            color: #999;
        }
        
        .food-card-sales {
            font-size: 11px;
            color: #bbb;
        }
        
        .food-card-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .food-card-price {
            font-size: 16px;
        }
        
        .cart-ctrl {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-reduce,
        .btn-add {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #ff6b35;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
        }
        
        .btn-add {
            background: #ff6b35;
            color: #fff;
            border: none;
        }
        
        .btn-reduce {
            color: #ff6b35;
            background: #fff;
        }
        
        .count-text {
            font-size: 14px;
            font-weight: bold;
            min-width: 20px;
            text-align: center;
        }
        
        .menu-cart-bar {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            background: #fff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
            z-index: 250;
            display: none;
        }
        
        .menu-cart-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .cart-icon-wrap {
            width: 40px;
            height: 40px;
            background: #ff6b35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 20px;
        }
        
        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #fff;
            color: #ff6b35;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 10px;
            text-align: center;
            line-height: 20px;
            font-weight: bold;
        }
        
        .cart-btn {
            background: #ff6b35;
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        /* 购物车页 */
        
        .cart-empty {
            text-align: center;
            padding: 80px 20px;
        }
        
        .cart-empty .icon {
            font-size: 60px;
            margin-bottom: 16px;
        }
        
        .cart-empty .text {
            font-size: 16px;
            color: #999;
            margin-bottom: 8px;
        }
        
        .cart-empty .desc {
            font-size: 13px;
            color: #bbb;
            margin-bottom: 20px;
        }
        
        .cart-empty .btn {
            display: inline-block;
            background: #ff6b35;
            color: #fff;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            font-size: 14px;
            color: #666;
        }
        
        .clear-btn {
            color: #ff6b35;
            cursor: pointer;
        }
        
        .cart-list {
            padding: 0 16px;
        }
        
        .cart-item {
            display: flex;
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        
        .cart-item-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        
        .cart-item-info {
            flex: 1;
            margin-left: 10px;
        }
        
        .cart-item-name {
            font-size: 14px;
        }
        
        .cart-item-price {
            font-size: 14px;
            margin: 4px 0;
        }
        
        .cart-item-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .item-total {
            font-size: 14px;
        }
        
        .remove-btn {
            color: #ff4444;
            font-size: 12px;
            cursor: pointer;
            margin-left: 12px;
        }
        
        .remark-section {
            padding: 12px 16px;
        }
        
        .remark-label {
            font-size: 14px;
            color: #666;
            margin-right: 8px;
        }
        
        .remark-input {
            flex: 1;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: 8px;
            font-size: 13px;
            width: 100%;
            margin-top: 6px;
        }
        
        .cart-footer {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            background: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
            z-index: 250;
        }
        
        .total-label {
            font-size: 14px;
        }
        
        .total-price {
            font-size: 20px;
        }
        
        .submit-btn {
            background: #ff6b35;
            color: #fff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        /* 订单页 */
        
        .order-tabs {
            display: flex;
            background: #fff;
            padding: 0 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .order-tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        
        .order-tab.active {
            color: #ff6b35;
            border-bottom-color: #ff6b35;
        }
        
        .order-empty {
            text-align: center;
            padding: 80px 20px;
        }
        
        .order-empty .icon {
            font-size: 60px;
            margin-bottom: 16px;
        }
        
        .order-empty .text {
            font-size: 16px;
            color: #999;
        }
        
        .order-empty .desc {
            font-size: 13px;
            color: #bbb;
            margin: 8px 0 20px;
        }
        
        .order-empty .btn {
            display: inline-block;
            background: #ff6b35;
            color: #fff;
            padding: 10px 30px;
            border-radius: 20px;
            cursor: pointer;
        }
        
        .order-list {
            padding: 10px 16px;
        }
        
        .order-item {
            background: #fff;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }
        
        .order-id {
            color: #999;
        }
        
        .order-status {
            font-weight: bold;
        }
        
        .status-pending {
            color: #ff6b35;
        }
        
        .status-cooking {
            color: #e67e22;
        }
        
        .status-completed {
            color: #2ecc71;
        }
        
        .order-food {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
        }
        
        .order-food .name {
            flex: 1;
        }
        
        .order-food .count {
            color: #999;
            margin: 0 10px;
        }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f5f5f5;
            font-size: 12px;
        }
        
        .order-time {
            color: #bbb;
        }
        
        .order-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .order-total {
            font-size: 13px;
        }
        
        .action-btn {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            border: 1px solid #ff6b35;
            color: #ff6b35;
        }
        
        .action-delete {
            border-color: #ddd;
            color: #999;
        }
        /* 我的页 */
        
        .user-header {
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        
        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }
        
        .user-name {
            font-size: 18px;
            font-weight: bold;
        }
        
        .user-stats {
            display: flex;
            background: #fff;
            margin: 10px 16px;
            border-radius: 12px;
            padding: 16px;
        }
        
        .stat-item {
            flex: 1;
            text-align: center;
            border-right: 1px solid #f0f0f0;
        }
        
        .stat-item:last-child {
            border: none;
        }
        
        .stat-num {
            font-size: 22px;
            font-weight: bold;
            color: #ff6b35;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .menu-list {
            background: #fff;
            margin: 10px 16px;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .menu-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            font-size: 14px;
        }
        
        .menu-list-item:last-child {
            border: none;
        }
        
        .menu-list-item .arrow {
            color: #ccc;
        }
        /* 详情页 */
        
        .detail-page {
            padding-bottom: 80px;
        }
        
        .detail-video-wrap {
            width: 100%;
            height: 240px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .detail-video-wrap .play-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
        }
        
        .detail-video-wrap video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .detail-info {
            background: #fff;
            margin: 10px 16px;
            border-radius: 12px;
            padding: 16px;
        }
        
        .detail-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .detail-name {
            font-size: 20px;
            font-weight: bold;
        }
        
        .detail-sales {
            font-size: 13px;
            color: #bbb;
        }
        
        .detail-price-row {
            display: flex;
            align-items: baseline;
            padding-bottom: 14px;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 14px;
        }
        
        .detail-price {
            font-size: 24px;
        }
        
        .detail-original {
            font-size: 14px;
            color: #ccc;
            text-decoration: line-through;
            margin-left: 8px;
        }
        
        .detail-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        
        .detail-text {
            font-size: 13px;
            color: #888;
            line-height: 1.8;
        }
        
        .related-section {
            background: #fff;
            margin: 10px 16px;
            border-radius: 12px;
            padding: 16px;
        }
        
        .related-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
        }
        
        .related-scroll::-webkit-scrollbar {
            display: none;
        }
        
        .related-item {
            min-width: 120px;
            text-align: center;
            cursor: pointer;
        }
        
        .related-img {
            width: 120px;
            height: 90px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .related-name {
            font-size: 12px;
            margin: 4px 0;
        }
        
        .detail-cart-bar {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            background: #fff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
            z-index: 250;
        }
        
        .detail-cart-icon {
            width: 40px;
            height: 40px;
            background: #ff6b35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-size: 20px;
            cursor: pointer;
        }
        
        .detail-add-btn {
            flex: 1;
            background: linear-gradient(135deg, #ff6b35, #ff8c42);
            color: #fff;

            return cart.reduce((sum, item) => sum + item.count, 0);
        }

        function getCartTotal() {
            return cart.reduce((sum, item) => sum + item.price * item.count, 0);
        }

        function addToCart(food) {
            const exist = cart.find(c => c.id === food.id);
            if (exist) {
                exist.count++;
            } else {
                cart.push({...food,
                    count: 1
                });
            }
            saveData();
            updateAllCartUI();
        }

        function reduceFromCart(id) {
            const idx = cart.findIndex(c => c.id === id);
            if (idx >= 0) {
                if (cart[idx].count > 1) {
                    cart[idx].count--;
                } else {
                    cart.splice(idx, 1);
                }
            }
            saveData();
            updateAllCartUI();
        }

            cart = cart.filter(c => c.id !== id);
            saveData();
            updateAllCartUI();
        }

function renderCart() {
  const empty = document.getElementById('cartEmpty');
  const content = document.getElementById('cartContent');
  if (cart.length === 0) {
    empty.style.display = 'block';
    content.style.display = 'none';
  } else {
    empty.style.display = 'none';
    content.style.display = 'block';
    document.getElementById('cartCount').textContent = '共' + getCartCount() + '件商品';
    document.getElementById('cartTotalPrice').textContent = getCartTotal().toFixed(2);
    document.getElementById('cartList').innerHTML = cart.map(c => `
      <div class="cart-item">
        <img src="${c.image}" class="cart-item-img" alt="${c.name}">
        <div class="cart-item-info">
          <div class="cart-item-name text-ellipsis">${c.name}</div>
          <div class="cart-item-price price">${c.price}</div>
          <div class="cart-item-bottom">
            <div class="cart-ctrl">
              <div class="btn-reduce" onclick="reduceFromCart(${c.id})">-</div>
              <span class="count-text">${c.count}</span>
              <div class="btn-add" onclick="addToCart({id:${c.id},name:'${c.name}',price:${c.price},image:'${c.image}'})">+</div>
            </div>
            <span class="item-total price">${(c.price * c.count).toFixed(2)}</span>
          </div>
        </div>
        <span class="remove-btn" onclick="removeFromCart(${c.id})">删除</span>

  }
}

  document.getElementById('detailContent').innerHTML = `

            <span class="price">${r.price}</span>
          </div>
        `).join('')}
      </div>
    </div>` : ''}
    <div style="height:80px"></div>
  `;
  
  // 底部购物栏
  const cartBar = document.createElement('div');
  cartBar.className = 'detail-cart-bar';
  cartBar.id = 'detailCartBar';
  cartBar.innerHTML = `
    <div class="detail-cart-icon" onclick="switchTab(2)"><img src="https://images.unsplash.com/photo-1544145945-f90425340c7e?w=50&h=50&fit=crop" style="width:28px;height:28px;border-radius:50%" alt="购物车"><span class="cart-badge" style="display:${getCartCount()>0?'block':'none'}">${getCartCount()}</span></div>

  orderFilter = filter;
  document.querySelectorAll('.order-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

// ==================== 页面切换 ====================
function switchTab(idx) {
  switchPage(idx < 5 ? ['home', 'menu', 'cart', 'order', 'user'][idx] : 'home');
  currentPage = idx;
}

function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pageMap = { home: 'page-home', menu: 'page-menu', cart: 'page-cart', order: 'page-order', user: 'page-user', detail: 'page-detail' };
  const el = document.getElementById(pageMap[name] || 'page-home');
  if (el) el.classList.add('active');
  
  // 更新 tabBar
  const tabIdx = { home: 0, menu: 1, cart: 2, order: 3, user: 4 }[name];
  document.querySelectorAll('.tab-item').forEach((t, i) => t.classList.toggle('active', i === tabIdx));
  
  // 更新导航栏标题
  const titles = { home: '点单小程序', menu: '点餐', cart: '购物车', order: '订单', user: '我的', detail: '菜品详情' };
  document.getElementById('navBar').textContent = titles[name] || '点单小程序';
  
  if (name === 'menu') renderMenu();
  if (name === 'cart') renderCart();
  if (name === 'order') renderOrders();
}

// ==================== 工具函数 ====================
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove('show'), 1500);
}

function showModal(title, content, cb) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').textContent = content;
  document.getElementById('modalMask').classList.add('show');
  modalCallback = cb;
}

function closeModal() {
  document.getElementById('modalMask').classList.remove('show');
  modalCallback = null;
}

document.getElementById('modalConfirmBtn').addEventListener('click', () => {
  if (modalCallback) modalCallback();
  closeModal();
});

document.getElementById('modalMask').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ==================== 轮播图 ====================
let bannerIdx = 0;
function initBanner() {
  const dots = document.getElementById('bannerDots');
  const total = 3;
  dots.innerHTML = Array.from({length: total}, (_, i) => `<span class="banner-dot ${i===0?'active':''}"></span>`).join('');
  setInterval(() => {
    bannerIdx = (bannerIdx + 1) % total;
    document.getElementById('bannerInner').style.transform = `translateX(-${bannerIdx * 100}%)`;
    dots.querySelectorAll('.banner-dot').forEach((d, i) => d.classList.toggle('active', i === bannerIdx));
  }, 3000);
}

// ==================== 初始化 ====================
renderHotList();
renderMenu();
renderCart();
renderOrders();
initBanner();
    </script>
